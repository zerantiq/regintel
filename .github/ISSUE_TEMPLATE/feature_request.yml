name: Feature Request
description: Suggest an improvement to the skill, references, or validation flow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap are you trying to solve?
      placeholder: The current repo scan misses...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Change
      description: Describe the behavior you want.
      placeholder: Add a new signal family or improve the validation flow by...
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Why does this matter for repo scanning, regulatory updates, or contributor workflow?
  - type: textarea
    id: validation
    attributes:
      label: Validation Ideas
      description: How should this be tested or reviewed?
