name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package dependencies
        run: pip install .

      - name: Validate repository structure
        run: make validate

      - name: Run regression tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests -v

      - name: Run benchmark harness quality gate
        if: matrix.python-version == '3.12'
        run: |
          python3 scripts/benchmark_harness.py \
            --labels tests/fixtures/benchmarks/labeled-corpus.json \
            --fixtures-root tests/fixtures/repos \
            --baseline tests/fixtures/benchmarks/baseline-metrics.json \
            --policy examples/benchmark-gate-policy.json \
            --workers 2 \
            --cache-dir /tmp/regintel-benchmark-cache \
            --format json > /tmp/benchmark.json

          python3 scripts/benchmark_harness.py \
            --labels tests/fixtures/benchmarks/labeled-corpus.json \
            --fixtures-root tests/fixtures/repos \
            --baseline tests/fixtures/benchmarks/baseline-metrics.json \
            --policy examples/benchmark-gate-policy.json \
            --workers 2 \
            --cache-dir /tmp/regintel-benchmark-cache \
            --format markdown > /tmp/benchmark.md

          python3 - <<'PY'
          import json
          from pathlib import Path

          benchmark = json.loads(Path("/tmp/benchmark.json").read_text())
          assert benchmark["meta"]["tool"] == "benchmark_harness"
          assert benchmark["gate"]["passed"] is True
          assert benchmark["overall"]["signals"]["precision"] >= 0.95
          assert benchmark["overall"]["signals"]["recall"] >= 0.95
          assert benchmark["overall"]["combined"]["precision"] >= 0.95
          assert benchmark["overall"]["combined"]["recall"] >= 0.95
          assert "Benchmark Quality Report" in Path("/tmp/benchmark.md").read_text()
          PY

      - name: Upload benchmark quality artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: regintel-benchmark-${{ github.run_number }}
          path: |
            /tmp/benchmark.json
            /tmp/benchmark.md

      - name: Smoke-test documented example commands
        run: |
          regintel-scan --path tests/fixtures/repos/ai-saas --scope full > /tmp/regintel-scan.json
          regintel-scan --path tests/fixtures/repos/fintech --scope full > /tmp/regintel-scan-2.json
          regintel-applicability --signals /tmp/regintel-scan.json --company examples/company-context.json --format json > /tmp/regintel-applicability.json
          regintel-deadlines --input examples/developments.json --as-of 2026-03-10 --format json > /tmp/deadlines.json
          regintel-diff --old examples/old-scan.json --new examples/new-scan.json --format json > /tmp/diff.json
          regintel-feed-sync --config tests/fixtures/feeds/feed-config.json --format json > /tmp/synced-developments.json
          regintel-snapshot --scan /tmp/regintel-scan.json --applicability /tmp/regintel-applicability.json --deadlines /tmp/deadlines.json --snapshot-dir /tmp/regintel-snapshots --timestamp 2026-03-10T10:00:00Z --format json > /tmp/snapshot-1.json
          regintel-snapshot --scan /tmp/regintel-scan-2.json --snapshot-dir /tmp/regintel-snapshots --timestamp 2026-03-11T10:00:00Z --format json > /tmp/snapshot-2.json
          regintel-trend --snapshot-dir /tmp/regintel-snapshots --format json > /tmp/trend.json
          regintel-dashboard --snapshot-dir /tmp/regintel-snapshots --format markdown > /tmp/dashboard.md
          regintel-gate --policy examples/compliance-gate-policy.json --scan /tmp/regintel-scan-2.json --format json > /tmp/gate.json
          regintel-benchmark --labels tests/fixtures/benchmarks/labeled-corpus.json --fixtures-root tests/fixtures/repos --baseline tests/fixtures/benchmarks/baseline-metrics.json --policy examples/benchmark-gate-policy.json --workers 2 --cache-dir /tmp/regintel-benchmark-cache --format json > /tmp/benchmark-cli.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          applicability = json.loads(Path("/tmp/regintel-applicability.json").read_text())
          deadlines = json.loads(Path("/tmp/deadlines.json").read_text())
          diff = json.loads(Path("/tmp/diff.json").read_text())
          synced = json.loads(Path("/tmp/synced-developments.json").read_text())
          snapshot_two = json.loads(Path("/tmp/snapshot-2.json").read_text())
          trend = json.loads(Path("/tmp/trend.json").read_text())
          gate = json.loads(Path("/tmp/gate.json").read_text())
          benchmark = json.loads(Path("/tmp/benchmark-cli.json").read_text())
          dashboard = Path("/tmp/dashboard.md").read_text()

          assert applicability["applicability"], "Applicability output should not be empty."
          labels = {item["id"]: item["warning_label"] for item in deadlines["developments"]}
          assert labels["gdpr-retention-review"] == "Action Needed Soon"
          assert labels["dora-full-application"] == "Critical Deadline"
          assert labels["nis2-transposition"] == "Upcoming Change"
          assert synced["developments"], "Feed sync output should include developments."
          changed = diff["collections"]["candidate_frameworks"]["changed"]
          added = diff["collections"]["signals"]["added"]
          assert changed, "Expected candidate framework score changes in example diff."
          assert added, "Expected added signals in example diff."
          assert applicability["meta"]["schema_version"] == "1.0.0"
          assert deadlines["meta"]["schema_version"] == "1.0.0"
          assert diff["meta"]["schema_version"] == "1.0.0"
          assert synced["meta"]["schema_version"] == "1.0.0"
          assert snapshot_two["meta"]["schema_version"] == "1.0.0"
          assert trend["meta"]["schema_version"] == "1.0.0"
          assert gate["meta"]["schema_version"] == "1.0.0"
          assert benchmark["meta"]["schema_version"] == "1.0.0"
          assert snapshot_two["trend"]["baseline_snapshot_id"], "Expected second snapshot to have a baseline."
          assert trend["snapshot_count"] >= 2, "Trend report should include snapshot history."
          assert gate["passed"] is True, "Default gate policy should pass for fintech smoke fixture."
          assert benchmark["gate"]["passed"] is True, "Default benchmark gate should pass for fixture corpus."
          assert "Regintel Monitoring Dashboard" in dashboard
          PY
