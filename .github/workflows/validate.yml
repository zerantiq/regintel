name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository structure
        run: make validate

      - name: Run regression tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests -v

      - name: Smoke-test documented example commands
        run: |
          python3 scripts/repo_signal_scan.py --path tests/fixtures/repos/ai-saas --scope full > /tmp/regintel-scan.json
          python3 scripts/applicability_score.py --signals /tmp/regintel-scan.json --company examples/company-context.json --format json > /tmp/regintel-applicability.json
          python3 scripts/check_deadlines.py --input examples/developments.json --as-of 2026-03-10 --format json > /tmp/deadlines.json
          python3 scripts/change_diff.py --old examples/old-scan.json --new examples/new-scan.json --format json > /tmp/diff.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          applicability = json.loads(Path("/tmp/regintel-applicability.json").read_text())
          deadlines = json.loads(Path("/tmp/deadlines.json").read_text())
          diff = json.loads(Path("/tmp/diff.json").read_text())

          assert applicability["applicability"], "Applicability output should not be empty."
          labels = {item["id"]: item["warning_label"] for item in deadlines["developments"]}
          assert labels["gdpr-retention-review"] == "Action Needed Soon"
          changed = diff["collections"]["candidate_frameworks"]["changed"]
          added = diff["collections"]["signals"]["added"]
          assert changed, "Expected candidate framework score changes in example diff."
          assert added, "Expected added signals in example diff."
          PY
