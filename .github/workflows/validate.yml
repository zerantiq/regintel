name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package dependencies
        run: pip install .

      - name: Validate repository structure
        run: make validate

      - name: Run regression tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests -v

      - name: Smoke-test documented example commands
        run: |
          python3 scripts/repo_signal_scan.py --path tests/fixtures/repos/ai-saas --scope full > /tmp/regintel-scan.json
          python3 scripts/repo_signal_scan.py --path tests/fixtures/repos/fintech --scope full > /tmp/regintel-scan-2.json
          python3 scripts/applicability_score.py --signals /tmp/regintel-scan.json --company examples/company-context.json --format json > /tmp/regintel-applicability.json
          python3 scripts/check_deadlines.py --input examples/developments.json --as-of 2026-03-10 --format json > /tmp/deadlines.json
          python3 scripts/change_diff.py --old examples/old-scan.json --new examples/new-scan.json --format json > /tmp/diff.json
          python3 scripts/sync_regulatory_feeds.py --config tests/fixtures/feeds/feed-config.json --format json > /tmp/synced-developments.json
          python3 scripts/snapshot_store.py --scan /tmp/regintel-scan.json --applicability /tmp/regintel-applicability.json --deadlines /tmp/deadlines.json --snapshot-dir /tmp/regintel-snapshots --timestamp 2026-03-10T10:00:00Z --format json > /tmp/snapshot-1.json
          python3 scripts/snapshot_store.py --scan /tmp/regintel-scan-2.json --snapshot-dir /tmp/regintel-snapshots --timestamp 2026-03-11T10:00:00Z --format json > /tmp/snapshot-2.json
          python3 scripts/trend_report.py --snapshot-dir /tmp/regintel-snapshots --format json > /tmp/trend.json
          python3 scripts/dashboard_report.py --snapshot-dir /tmp/regintel-snapshots --format markdown > /tmp/dashboard.md
          python3 scripts/compliance_gate.py --policy examples/compliance-gate-policy.json --scan /tmp/regintel-scan-2.json --format json > /tmp/gate.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          applicability = json.loads(Path("/tmp/regintel-applicability.json").read_text())
          deadlines = json.loads(Path("/tmp/deadlines.json").read_text())
          diff = json.loads(Path("/tmp/diff.json").read_text())
          synced = json.loads(Path("/tmp/synced-developments.json").read_text())
          snapshot_two = json.loads(Path("/tmp/snapshot-2.json").read_text())
          trend = json.loads(Path("/tmp/trend.json").read_text())
          gate = json.loads(Path("/tmp/gate.json").read_text())
          dashboard = Path("/tmp/dashboard.md").read_text()

          assert applicability["applicability"], "Applicability output should not be empty."
          labels = {item["id"]: item["warning_label"] for item in deadlines["developments"]}
          assert labels["gdpr-retention-review"] == "Action Needed Soon"
          assert labels["dora-full-application"] == "Critical Deadline"
          assert labels["nis2-transposition"] == "Upcoming Change"
          assert synced["developments"], "Feed sync output should include developments."
          changed = diff["collections"]["candidate_frameworks"]["changed"]
          added = diff["collections"]["signals"]["added"]
          assert changed, "Expected candidate framework score changes in example diff."
          assert added, "Expected added signals in example diff."
          assert snapshot_two["trend"]["baseline_snapshot_id"], "Expected second snapshot to have a baseline."
          assert trend["snapshot_count"] >= 2, "Trend report should include snapshot history."
          assert gate["passed"] is True, "Default gate policy should pass for fintech smoke fixture."
          assert "Regintel Monitoring Dashboard" in dashboard
          PY
